events {
    worker_connections 1024;
}

http {
    # Define the JSON format
    log_format hng_json escape=json '{'
        '"source_ip": "$remote_addr",'
        '"timestamp": "$time_iso8601",'
        '"method": "$request_method",'
        '"path": "$request_uri",'
        '"status": "$status",'
        '"response_size": "$body_bytes_sent"'
    '}';

    access_log /var/log/nginx/hng-access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # 👇 Define upstreams (more stable + scalable)
    upstream nextcloud_backend {
        server nextcloud:80;
    }

    upstream detector_backend {
        server detector:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://nextcloud_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://detector_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
