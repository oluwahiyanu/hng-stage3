volumes:
  HNG-nginx-logs:
  nextcloud-data:

networks:
  internal:
    driver: bridge

services:

  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: always

    environment:
      - UPLOAD_MAX_FILESIZE=512M

    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx

    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: always

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx

    depends_on:
      - nextcloud
      - detector

    networks:
      - internal

  detector:
    build:
      context: ./detector

    restart: always
    privileged: true

    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - /var/log/detector:/var/log/detector

    environment:
      - PYTHONUNBUFFERED=1

    cap_add:
      - NET_ADMIN
      - NET_RAW

    networks:
      - internal
